backend:
  name: git-gateway
  branch: main

media_folder: "images/covers"
public_folder: "/images/covers"

collections:
  - name: "books"
    label: "Books"
    files:
      - file: "data/books.json"
        label: "Book Database"
        name: "books"
        fields:
          - {label: "Books", name: "books", widget: "list"}
